# HTTP only — Cloudflare handles HTTPS termination (Flexible SSL mode).
# Cloudflare connects to this origin over HTTP on port 80.

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    application/javascript application/json application/ld+json
    application/xml text/css text/javascript text/plain text/xml
    image/svg+xml font/ttf font/otf;

server {
    listen 80;
    server_name hzortech.com www.hzortech.com _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static files — 1-year cache (WhiteNoise content-hashes filenames)
    location /static/ {
        proxy_pass       http://django:8000;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
        add_header       Vary "Accept-Encoding";
        access_log       off;
    }

    # Sitemap — 12h cache
    location = /sitemap.xml {
        proxy_pass         http://django:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        add_header         Cache-Control "public, max-age=43200";
    }

    # robots.txt — 1-day cache
    location = /robots.txt {
        proxy_pass         http://django:8000;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # Django application
    location / {
        proxy_pass         http://django:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }
}
