# HTTP only — Cloudflare handles HTTPS termination (Flexible SSL mode)
# Cloudflare connects to this server over HTTP on port 80
server {
    listen 80;
    server_name hzortech.com www.hzortech.com _;

    # Let's Encrypt ACME challenge (for future cert if switching to Full SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass         http://django:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
