# ----------------------------
# HTTP → HTTPS redirect
# ----------------------------
server {
    listen 80;
    server_name hzortech.com www.hzortech.com;

    # Redirect all traffic to HTTPS
    return 301 https://$host$request_uri;

    # Let’s Encrypt ACME challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# ----------------------------
# HTTPS server block
# ----------------------------
server {
    listen 443 ssl http2;
    server_name hzortech.com www.hzortech.com;

    # SSL certificate paths (after Certbot)
    ssl_certificate /etc/letsencrypt/live/hzortech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hzortech.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'HIGH:!aNULL:!MD5';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to Django Gunicorn inside Docker
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Serve static files directly
    location /static/ {
        alias /app/staticfiles/;
    }

    # Optional: serve media files
    location /media/ {
        alias /app/mediafiles/;
    }

    # Logging
    access_log /var/log/nginx/hzortech_access.log;
    error_log /var/log/nginx/hzortech_error.log;
}

# ----------------------------
# Optional: HSTS for security
# ----------------------------
# Uncomment if you want to enforce HTTPS on all subdomains
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;