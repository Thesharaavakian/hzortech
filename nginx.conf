# ── Gzip compression ──────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name hzortech.com www.hzortech.com;

    # Let's Encrypt ACME challenge before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://hzortech.com$request_uri;
    }
}

# ── www → non-www redirect ─────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.hzortech.com;

    ssl_certificate /etc/letsencrypt/live/hzortech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hzortech.com/privkey.pem;

    return 301 https://hzortech.com$request_uri;
}

# ── Primary HTTPS server ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name hzortech.com;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/hzortech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hzortech.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── Static files — 1-year cache (WhiteNoise hashes filenames) ────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;

        # Compress SVG/fonts at rest
        gzip_static on;
    }

    # ── Media files ──────────────────────────────────────────────────────────
    location /media/ {
        alias /app/mediafiles/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── robots.txt & sitemap — short cache, no log ──────────────────────────
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 12h;
        add_header Cache-Control "public";
    }

    # ── Django application ───────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_redirect off;

        # HTML pages — short cache, revalidate
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/hzortech_access.log;
    error_log /var/log/nginx/hzortech_error.log warn;
}
