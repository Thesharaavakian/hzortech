---
# cert-manager ClusterIssuer — talks to Let's Encrypt for auto TLS certs
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: shara@hzortech.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik

---
# Ingress — Traefik (built into k3s) routes traffic + cert-manager issues TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hzortech-ingress
  namespace: hzortech
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # Redirect HTTP → HTTPS automatically
    traefik.ingress.kubernetes.io/router.middlewares: hzortech-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - hzortech.com
        - www.hzortech.com
      secretName: hzortech-tls
  rules:
    - host: hzortech.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django
                port:
                  number: 80
    - host: www.hzortech.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django
                port:
                  number: 80

---
# Traefik middleware: HTTP → HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: hzortech
spec:
  redirectScheme:
    scheme: https
    permanent: true
