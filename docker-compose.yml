services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: /opt/hzortech/.env
    environment:
      POSTGRES_DB: hzortech
      POSTGRES_USER: hzortech
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hzortech"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    image: ghcr.io/thesharaavakian/hzortech:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: /opt/hzortech/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: hzortech
      POSTGRES_USER: hzortech
    expose:
      - "8000"
    command: sh -c "python manage.py migrate --noinput && gunicorn hzortech.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --access-logfile - --error-logfile -"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - django
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/hzortech/nginx-dc.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

volumes:
  postgres_data:
