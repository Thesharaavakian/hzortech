name: Deploy Hzortech

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write        # needed to push to ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Build & push image to GitHub Container Registry ─────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/thesharaavakian/hzortech:latest

      # ── 3. Deploy to k3s on EC2 ─────────────────────────────────────────
      - name: Deploy to k3s
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Pull latest manifests
            cd /opt/hzortech
            if [ ! -d ".git" ]; then
              git clone https://github.com/Thesharaavakian/hzortech.git .
            else
              git pull origin master
            fi

            # Refresh the ghcr.io pull secret so k3s can always pull the image
            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace hzortech \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | kubectl apply -f -

            # Apply all manifests (namespace, configmap, postgres, django, ingress)
            kubectl apply -f k8s/00-namespace.yaml
            kubectl apply -f k8s/01-configmap.yaml
            kubectl apply -f k8s/02-postgres.yaml
            kubectl apply -f k8s/03-django.yaml
            kubectl apply -f k8s/04-ingress.yaml

            # Force Django pods to pull the new image and re-run migrations
            kubectl rollout restart deployment/django -n hzortech

            # Wait for the rollout to finish before reporting success
            kubectl rollout status deployment/django -n hzortech --timeout=120s
