name: Deploy Hzortech

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── 1. Build & push image ────────────────────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/thesharaavakian/hzortech:latest

      # ── 2. Skip if server not ready yet ──────────────────────────────────
      - name: Check EC2_HOST is set
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST not set yet — skipping deploy step."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── 3. Deploy via Docker Compose ─────────────────────────────────────
      - name: Deploy to server
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/opt/hzortech"

            # Pull latest code — hard reset ensures local edits never block a deploy
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/Thesharaavakian/hzortech.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin master
              git reset --hard origin/master
            fi

            cd "$APP_DIR"

            # Log in to ghcr.io so docker can pull the image
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image and restart (migrations run inside the django command)
            docker compose pull
            docker compose up -d --remove-orphans

            # Wait for django to be healthy
            echo "Waiting for django to start..."
            for i in $(seq 1 20); do
              docker compose ps django | grep -q "Up" && echo "Django is up." && break
              echo "  [$i/20] not up yet, waiting 5s..."
              sleep 5
            done

            docker compose ps
