name: Deploy Hzortech

on:
  push:
    branches: [master]
  workflow_dispatch:         # so terraform.yml can re-trigger this after bootstrap

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── 1. Build & push image ────────────────────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/thesharaavakian/hzortech:latest

      # ── 2. Skip deploy if server not provisioned yet ─────────────────────
      - name: Check EC2_HOST is set
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST is not set yet — Terraform hasn't run. Skipping deploy."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── 3. Deploy to k3s ─────────────────────────────────────────────────
      - name: Deploy to k3s
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/hzortech
            if [ ! -d ".git" ]; then
              git clone https://github.com/Thesharaavakian/hzortech.git .
            else
              git pull origin master
            fi

            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace hzortech \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GITHUB_TOKEN }} \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl apply -f k8s/00-namespace.yaml
            kubectl apply -f k8s/01-configmap.yaml
            kubectl apply -f k8s/02-postgres.yaml
            kubectl apply -f k8s/03-django.yaml
            kubectl apply -f k8s/04-ingress.yaml

            kubectl rollout restart deployment/django -n hzortech
            kubectl rollout status deployment/django -n hzortech --timeout=120s
